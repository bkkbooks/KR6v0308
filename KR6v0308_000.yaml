body:
  text: 明治十九年六月正四位山岡鐵太郎書冠導俱舍論敘蓋轉小向大閻浮洲一作之通規也故欲溯於阿鋡海者無不繇阿毗達磨之道矣所謂合抱之木生于毫末九層之臺起于纍土者也是以和漢古今諸師先著鞭本論探幽鉤玄各成一家其中以光寶二師為巨擘麟暉諸師次之余嘗讀分別世品略窺世界建立之大體多年疑團為之冰解昔漢武帝問昆明池之黑灰于竺僧山海經記閩山之螺蚌殼知是劫初三災之證論歷歷可見焉耳近時元發思八著彰所知論備載山河大地四劫始終之相清魏源著國地驗論駁擊洋學固陋偏僻之妄見是乃活用此論之餘力也所以聰明論為聰明論於是乎可觀也西京泉山旭雅阿闍梨每講本論病其末流卷帙浩繁亡羊易迷是以淘汰諸議折衷衆説考核精審無所遺闕不煩校讐一矚瞭然可謂導初學之南針矣方今洋學浸淫白面書生動輒曰釋教陳腐不足信用此書一出對照彼此則見其怪物異狀若燃靈犀焉一日徵余序余贊揚此盛舉樂為之序明治十九年夏五淨土門主順徹定撰冠導阿毗達磨俱舍論序佐伯旭雅上人編輯冠導阿毗達磨俱舍論杉原春洞瀨邊惠燈勘文之既上梓乞序山野山野頑在於不立文字之家又何知之而春洞惠燈二子來責之懇至塞之無辭因思之上人博識卓見而成此編輯利益後生不鮮二子亦輔之而成功可謂勤矣而上人曰不過雛僧階梯以豫見之乃不然遂賦野偈一首曰初發心正覺階梯即寶樓學知無學地始好作歸休乃是為序明治十九年五月萬年退耕菴主獨園識雒下玉堂泛香謹書刻冠導俱舍論序夫小乘者出世之初門佛法之石礎之苟欲學佛教者豈可不依此石礎乎小乘雖分部於二十薩婆多之所立最得其本分宜哉世人言小乘直爾至謂有部矣雖然彼部之論藏廣略數十帙苟得其中者獨聰明論歟故從西方及本朝注解以百數矣然多自本末未有便披覽如項疏冠注者初學勞對見矣先匠往往有冠書傍注本論之校本豫亦加冠導插入圖以補講辨焉近挽書肆某請刻余講本便後進豫辭曰前匠冠導者公之世亦有裨益矣豫所增補者杜撰拙劣宜自刪以應子之求某強請併刻不息焉余以為凡如是者不過雛僧之階梯豈示大方君子乎若有小補者何必避識者之嗤笑矣遂許其請附𢆰焉但恐校讎疏漏多別風淮雨之誤讀者糾正之豫大幸而已時明治十九年龍舍柔兆閹茂吠舍佉月書比丘旭雅
