body:
  text: 尊者世親造唐三藏法師玄奘奉詔譯扶桑雒陽比丘旭雅編輯分別業品第四之三此別解脫靜慮無漏三種律儀從彼得一亦餘二不不爾云何頌曰從一切二現得欲界律儀從根本恆時得靜慮無漏論曰欲界律儀謂別解脫此從一切根本業道及從加行後起而得從二得者謂從二業即情非情性罪遮罪從現得者謂從現世蘊處界得非從去來由此律儀有情處轉去來非是有情處故若得靜慮無漏律儀應知但從根本業道尚不從彼加行後起得此律儀况從遮罪從恆時者謂從過去現在未來蘊處界得由此差別應作四句有蘊處界從彼唯得別解律儀非餘二等第一句者謂從現世加行後起及諸遮罪第二句者謂從去來根本業道第三句者謂從現世根本業道第四句者謂從去來加行後起非於正得善律儀時可有現世惡業道等是故應言從現處得理應但説防護未來定不應言防護過現諸有獲得律不律儀從一切有情支因有異不此定有異異相云何頌曰律從諸有情支因説不定不律從一切有情支非因論曰律儀定從一切有情得無少分理支因説不定支不定者有從一切得謂苾芻律儀有從四支得謂所餘律儀唯根本業道名律儀支故因不定者謂或有義從一切因或約餘義唯許從一從一切者謂從無貪瞋癡必俱起故唯從一者謂從下中上心不俱起故此中且就後三因説或有一類住律儀者於一切有情得律儀非一切支非一切因謂以下心或中或上受近事勤䇿戒或有一類住律儀者於一切有情得律儀由一切支非一切因謂以下心或中或上受苾芻戒或有一類住律儀者於一切有情得律儀由一切支及一切因謂以三心受近事勤䇿苾芻戒或有一類住律儀者於一切有情得律儀由一切因非一切支謂以三心受近事近住勤䇿戒無有不遍於諸有情得律儀者以於一切諸有情所住善意樂方得律儀異則不然以惡意樂不全息故若人不作五種定限方可受得別解律儀謂有情支處時緣定有情定者念我唯於某類有情當離殺等言支定者念我唯於某律儀支當持不犯言處定者念我唯住某類方域當離殺等言時定者念我唯於一月等時能離殺等言緣定者念我唯除鬥戰等緣能離殺等如是受者不得律儀但得律儀相似妙行於非所能境如何得律儀由普於有情發起增上不損命意樂故得律儀毗婆沙師有作是説若謂一向於所能境方可受得別解律儀則此律儀應有增減以所能境與非所能二類有情有轉易故如是便有別解律儀離得捨緣有得捨過彼説不然如生草等先無後起或起已枯於彼律儀無增無減能不能境所得律儀境轉易時例亦應爾彼言不爾所以者何以諸有情前後性等草等前後性不同故若爾有情般涅槃已如前性類今時既無於彼律儀如何無減故如是釋於理不然前所説因於理為善若爾前佛及所度生已涅槃者後佛於彼既不發得別解律儀如何尸羅無減前過以一切佛別解律儀皆從一切有情處得設彼有情今猶在者後佛從彼亦得律儀故後尸羅無減前過已説從彼得諸律儀得不律儀定從一切有情業道無少分境及不具支不律儀者此定無有由一切因下品等心無俱起故若有一類由下品心得不律儀後於異時由上品心斷衆生命彼但成就下不律儀亦成殺生上品表等中品上品例此應知此中何名不律儀者謂諸屠羊屠雞屠豬捕鳥捕魚獵獸劫盜魁膾典獄縛龍煮狗及罝弶等等言類顯王典刑罰及餘聽察斷罪等人但恆有害心名不律儀者由彼一類住不律儀或有不律儀名不律儀者言屠羊者謂為活命要期盡壽恆欲害羊餘隨所應當知亦爾遍於有情界得諸律儀其理可爾由普欲利樂勝阿世耶而受得故非屠羊等不律儀人於己至親有損害意乃至為救自身命緣亦不欲殺如何可説普於一切得不律儀由彼至親若為羊等於彼亦可有損害心既知至親現非羊等如何於彼可有害心又聖必無作羊等理如何於彼得不律儀若觀未來羊等自體於現相續得不律儀是則羊等於未來世亦有至親及聖自體於彼決定無損害心是則應觀未來自體不於現在得不律儀於羊等現身既有害意如何不於彼得不律儀於母等現身既無害意如何亦於彼得不律儀於等事中應求異理又屠羊等不律儀人於一生中不與不取於己妻妾住知足心啞不能言無語四過如何彼亦得具支不律儀彼遍損善阿世耶故雖啞不言而身表語所欲説義故得具支若爾彼人或時先受二三學處後但受殺於餘不損善阿世耶如何具發七支惡戒毗婆沙者作如是言必無缺支及餘一分可得名住不律儀人經部諸師作如是説隨所期限支具不具及全分一分皆得不律儀律儀亦然唯除八戒由隨彼量善惡尸羅性相相違互相遮故已説從彼得不律儀得不律儀及餘無表如何方便未説當説頌曰諸得不律儀由作及誓受得所餘無表由田受重行論曰諸不律儀由二因得一者生在不律儀家由初現行殺等加行二者雖復生在餘家由初要期受殺等事謂我當作如是事業以求財物養活自身當於爾時便發惡戒得餘無表由三種因一者由田謂於如是諸福田所施園林等彼善無表初施便生如説有依諸福業事二者由受謂自誓言若未禮佛不先食等或作誓限於齋日月半月及年常施食等三由重行謂起如是殷重作意行善行惡由此三因起餘無表如是已説得律儀等捨律儀等未説當説且云何捨別解律儀頌曰捨別解調伏由故捨命終及二形俱生斷善根夜盡有説由犯重餘説由法滅迦濕彌羅説犯二如負財論曰言調伏者意顯律儀由此能令根調伏故唯除近住所餘七種別解律儀由四緣捨一由意樂對有解人發有表業捨學處故二由棄捨衆同分故三由二形俱時生故四由所因善根斷故捨近住戒由前四緣及由夜盡是故總説別解律儀由五緣捨何緣捨戒由此五緣與受相違表業生故所依捨故所依變故所因斷故過期限故有餘部説於四極重感墮罪中若隨犯一亦捨勤䇿苾芻律儀有餘部言由正法滅亦能令捨別解律儀以法滅時一切學處結界羯磨皆止息故迦濕彌羅國毗婆沙師言犯根本罪時不捨出家戒所以然者非犯一邊一切律儀應遍捨故非犯餘罪有斷尸羅然有二名謂持犯戒如有財者負他債時名為富人及負債者若於所犯發露悔除名具尸羅不名犯戒如還債已但名富人若爾何緣薄伽梵説犯四重者不名苾芻不名沙門非釋迦子破苾芻體害沙門性壞滅墮落立他勝名依勝義苾芻密意作是説此言凶勃凶勃者何謂於世尊了義所説以別義釋令成不了與多煩惱者為犯重罪緣寧知此言是了義説律中自釋有四苾芻一名想苾芻二自稱苾芻三乞丐苾芻四破戒苾芻此義中言非苾芻者謂非白四羯磨受具足戒苾芻非此苾芻先是勝義後由犯重成非苾芻故知此言是了義説然彼所説非犯一邊一切律儀應遍捨者彼言便是徵詰大師大師此中立如是喻如多羅樹若被斷頭必不復能生長廣大諸苾芻等犯重亦然大師此中喻顯何義意顯於戒隨犯一邊根本重罪令餘所受必不復能生長廣大謂彼毀犯諸重罪時違越苾芻根本行故與極猛利無慙無愧共相應故行根既斷理應遍捨一切律儀又犯重人世尊不許食僧祇食下至一摶踐毗訶羅一足跟地擯出一切苾芻事業大師依彼説如是言應速拔除稻禾稗莠應速簡棄腐朽棟梁應速簸揚種中粳秕如是應速驅擯衆中實非苾芻稱苾芻者彼苾芻體其相如何隨相是何體必應有以世尊説準陀當知有四沙門更無第五所言四者一勝道沙門二示道沙門三命道沙門四汙道沙門雖有此説而彼唯有餘沙門相故名沙門如被燒材假鸚鵡𭪿涸池敗種火輪𣦸人若犯重人非苾芻者則應無有授學苾芻不説犯重人皆成他勝罪但成他勝罪定説非苾芻謂或有人相續殊勝雖犯極重戒而非他勝罪由彼無有一念覆心法主世尊制立如是若犯他勝便非苾芻何不重令出家受戒由彼相續已為極重無慙愧懷無力能發出家律儀如焦種故非觀彼有苾芻律儀故不重令出家受戒所以然者設彼後時謂是苾芻更捨所學亦不許彼重出家故於此無義苦救何為若如是人猶有苾芻性應自歸禮如是類苾芻正法滅時雖無一切結界羯磨及毗奈耶未得律儀無新得理而先得者無有捨義靜慮無漏二律儀等云何當捨頌曰捨定生善法由易地退等捨聖由得果練根及退失論曰諸靜慮地所繫善法由二緣捨一由易地謂從下地生上地時或上地沒來生下地二由得退謂從已獲勝定功德還退失時等言為顯捨衆同分亦捨少分殊勝善根如色界中所有善法由易地退捨無色界亦然唯無律儀與色界異無漏善法由三緣捨一由得果謂得果時捨前向道及果道故二由練根謂練根位由得利道捨鈍道故三由退失謂得退時退失果道勝果道故如是已説捨諸律儀不律儀云何捨頌曰捨惡戒由𣦸得戒二形生論曰諸不律儀由三緣捨一者由𣦸捨所依故二由得戒謂若受得別解律儀或由獲得靜慮律儀惡戒便捨由因緣力得律儀時諸不律儀一切皆斷以善惡戒其性相違善戒於中勢力強故三由相續二形俱生以於爾時所依變故住惡戒者雖或有時起不作思捨刀網等若不受得諸善律儀諸不律儀無容棄捨譬如雖避發病因緣不服良藥病終難愈不律儀者受近住戒至夜盡位捨律儀時為得不律儀為名處中者有餘師説得不律儀惡阿世耶非永捨故如停熱鐵赤滅青生有餘師言若不更作無緣令彼得不律儀以不律儀依表得故處中無表捨復云何頌曰捨中由受勢作事壽根斷論曰處中無表捨由六緣一由受心斷壞故捨謂捨所受作是念言我從今時棄先所受二由勢力斷壞故捨謂由淨信煩惱勢力所引無表彼二限勢若斷壞時無表便捨如所放箭及陶家輪弦等勢力盡時便止三由作業斷壞故捨謂如所受後更不作四由事物斷壞故捨事物者何謂所捨施寺舍敷具制多園林及所施為罝網等事五由壽命斷壞故捨謂所依止有轉易故六由善根斷壞故捨謂起加行斷善根時便捨善根所引無表欲非色善及餘一切非色染法捨復云何頌曰捨欲非色善由根斷上生由對治道生捨諸非色染論曰欲界一切非色善法捨由二緣一斷善根二生上界三界一切非色染法捨由一緣謂彼但由對治道起若此品類能斷道生當捨此中所有煩惱及彼助伴非餘方便善惡律儀何有情有頌曰惡戒人除北二黃門二形律儀亦在天唯人具三種生欲天色界有靜慮律儀無漏并無色除中定無想論曰唯於人趣有不律儀然除北洲唯三方有於三洲內復除扇搋及半擇迦具二形者律儀亦爾謂於人中除前所除并天亦有故於二趣容有律儀復以何緣知扇搋等所有相續非律儀依由經律中有誠證故謂契經説佛告大名諸有在家白衣男子男根成就歸佛法僧起殷淨心發誠諦語自稱我是塢波索迦願尊憶持慈悲護念齊是名曰塢波索迦毗奈耶中亦作是説汝應除棄此色類人故知律儀非彼類有復由何理彼無律儀由二所依所起煩惱於一相續俱增上故於正思擇無堪能故無有極重慚愧心故若爾何故無不律儀彼於惡中心不定故又若是處有善律儀則惡律儀於彼亦有由此二種相翻立故北俱盧人無受及定及無造惡勝阿世耶是故彼無善戒惡戒猛利慚愧惡趣中無故律不律儀於彼亦非有與勝慚愧相應相違方有律儀不律儀故又扇搋等如鹹鹵田故不能生善戒惡戒世間現見諸鹹鹵田不能滋生嘉苗穢草若爾何故契經中言有卵生龍半月八日每從宮出來至人間求受八支近住齋戒此得妙行非得律儀是故律儀唯人天有然唯人具三種律儀謂別解脫靜慮無漏若生欲天及生色界皆容得有靜慮律儀生無色界彼必非有無漏律儀亦在無色謂若生在欲界天中及生色界中除中定無想皆容得有無漏律儀生無色中唯得成就以無色故必不現起因辨諸業性相不同當釋經中所標諸業且經中説業有三種善惡無記其相云何頌曰安不安非業名善惡無記論曰如是名為善等業相謂安穩業説名為善能得可愛異熟涅槃暫永二時濟衆苦故不安穩業名為不善由此能招非愛異熟與前安穩性相違故非前二業立無記名不可記為善不善故又經中説業有三種福非福等其相云何頌曰福非福不動欲善業名福不善名非福上界善不動約自地處所業果無動故論曰欲界善業説名為福招可愛果益有情故諸不善業説名非福招非愛果損有情故上二界善説名不動豈不世尊説下三定皆名有動聖説此中有尋伺等名為動故由下三定有尋伺等災患未息故立動名不動經中據能感得不動異熟説名不動如何有動定招無動異熟雖此定中有災患動而業對果非如欲界有動轉故立不動名謂欲界中餘趣處業由別緣力異趣處受以或有業能感外內財位形量色力樂等於天等中此業應熟由別緣力所引轉故於人等中此業便熟色無色界餘地處業無容轉令異地處受業果處定立不動名又經中説業有三種順樂受等其相云何頌曰順樂苦非二善至三順樂諸不善順苦上善順非二餘説下亦有由中招異熟又許此三業非前後熟故順受總有五謂自性相應及所緣異熟現前差別故論曰諸善業中始從欲界至第三靜慮名順樂受業以諸樂受唯至此故諸不善業名順苦受過三靜慮上地諸善業説名為順不苦不樂受此上都無苦樂受故非此諸業唯感受果應知亦感彼受資糧受及資糧此中名受有餘師説下諸地中亦有第三順非二業由中定業招異熟故若異此者中間定業應無異熟或應無業以無苦樂異熟果故有餘師説此業能感根本地中樂根異熟有説此業不感受果二説俱與本論相違故本論言頗有業感心受異熟非身耶曰有謂善無尋業又本論説頗有三業非前非後受異熟耶曰有謂順樂受業色順苦受業心心所法順不苦不樂受業心不相應行乃至廣説由此證知下地亦有順非二業非離欲界有此三業俱時熟故此業為善為不善耶是善而劣若爾便與所説相違謂善至三名順樂受得可愛果名為善業應知彼據多分為言此業與受體性既殊如何説為順樂受等業與樂受體性雖殊而能為因利益樂受或復此業是樂所受彼樂如何能受於業樂是此業異熟果故或復彼樂是業所受由此能受樂異熟故如順浴散此亦應然是故名為順樂受業順餘二業應知亦爾總説順受略有五種一自性順受謂一切受如契經説受樂受時如實了知受於樂受乃至廣説二相應順受謂一切觸如契經説順樂受觸乃至廣説三所緣順受謂一切境如契經説眼見色已唯受於色不受色貪乃至廣説由色等是受所緣故四異熟順受謂感異熟業如契經説順現受業乃至廣説五現前順受謂正現行受如契經言受樂受時二受便滅乃至廣説非此樂受現在前時有餘受能受此樂受但據樂受自體現前即説名為受於樂受此中但説異熟順受由業能招受異熟故雖業與受體性有殊而得名為順樂受等如是三業有定不定其相云何頌曰此有定不定定三順現等或説業有五餘師説四句論曰此上所説順樂受等應知各有定不定異非定受故立不定名定復有三一順現法受二順次生受三順後次受此三定業并前不定總成四種或有欲令不定受業復有二種謂於異熟有定不定并定業三合成五種順現法受者謂此生造即此生熟順次生受者謂此生造第二生熟順後次受者謂此生造從第三生後次第熟有餘師説順現法受業餘生亦得熟隨初熟位建立業名為順現等勿強力業異熟果少毗婆沙師不許此義以或有業果近非勝或有相違譬如外種經三半月葵便結實要經六月麥方結實譬喻者説業有四句一者有業於時分定異熟不定謂順現等三非定得異熟二者有業於異熟定時分不定謂不定業定得異熟三者有業於二俱定謂順現等定得異熟四者有業於二俱不定謂不定業非定得異熟彼説諸業總成八種謂順現受有定不定乃至不定亦有二種於此所説業差別中頌曰四善容俱作引同分唯三諸處造四種地獄善除現堅於離染地異生不造生聖不造生後并欲有頂退論曰順現法受等三業唯定并不定為四是説為善此中唯顯時定不定釋經所説四業相故頗有四業俱時作耶容有云何遣三使已自行邪欲俱時究竟幾業能引衆同分耶能引唯三除順現受現身同分先業引故何界何趣能造幾業諸界諸趣或善或惡隨其所應皆容造四總開如是若就別遮於地獄中善除順現無愛果故餘皆得造不退姓名堅彼於離染地若異生類除順生受可造餘三聖者雙除順生順後可造餘二異生不退無次更生後還生下不退聖者必無還生下諸地故隨所生地容造順現受造不定業一切處無遮然諸聖者若於欲界及有頂處已得離染雖有退墮而亦不造順生後業從彼退者必退果故諸退果已必不命終如後當辨住中有位亦造業耶亦造云何頌曰欲中有能造二十二種業皆順現受攝類同分一故論曰於欲界中住中有位容有能造二十二業謂中有位及處胎中出胎已後各有五位胎中五者一羯剌藍二頞部曇三閉尸四鍵南五鉢羅奢佉胎外五者一嬰孩二童子三少年四中年五老年住中有位能造中有乃至老年定不定業應知如是中有所造十一種定業皆順現受攝由類同分無差別故謂此中有位與自類十位一衆同分一業引故由此不別説順中有受業即順生等業所引故諸定受業其相云何頌曰由重惑淨心及是恆所造於功德田起害父母業定論曰若所造業由重煩惱或淳淨心或常所作或於增上功德田起功德田者謂佛法僧或勝補特伽羅謂得勝果勝定於此田所雖無重惑及淳淨心亦非常行若善不善所起諸業或於父母隨輕重心行損害事如是一切皆定業攝餘非定受現法果業其相云何頌曰由田意殊勝及定招異熟得永離地業定招現法果論曰由田勝者聞有苾芻於僧衆中作女人語彼於現世轉作女人此等傳聞其類非一由意勝者聞有黃門救脫諸牛黃門事故彼於現世轉作丈夫此等傳聞事亦非一或生此地永離此地染於此地中諸善不善業於異熟定位不定者此業必能招現法果若有餘位順定受業彼必定無永離染義必於餘位受異熟果若於異熟亦不定者永離染故不受異熟何田起業定即受耶頌曰於佛上首僧及滅定無諍慈見修道出損益業即受論曰於如是類功德田中為善惡業定即受果功德田者謂佛上首僧約補特伽羅差別有五一從滅定出謂此定中得心寂靜此定寂靜似涅槃故若從此定初起心時如入涅槃還復出者二從無諍出謂此定中有緣無量有情為境增上利益意樂隨逐出此定時有為無量最勝功德所熏修身相續而轉三從慈定出謂此定中有緣無量有情為境增上安樂意樂隨逐出此定時有為無量最勝功德所熏修身相續而轉四從見道出謂此道中永斷一切見所斷惑得勝轉依從此出時淨身續起五從修道出謂此道中永斷一切修所斷惑得勝轉依從此出時淨身續起故説此五名功德田若有於中為損益業此業必定能招即果若從餘定餘果出時由前所修定非殊勝修所斷惑未畢竟盡故彼相續非勝福田異熟果中受最為勝今應思擇於諸業中頗有唯招心受異熟或招身受非心受耶亦有云何頌曰諸善無尋業許唯感心受惡唯感身受是感受業異論曰善無尋業謂從中定乃至有頂所有善業於中能招受異熟者應知但感心受非身身受必與尋伺俱故諸不善業能感受者應知但感身受非心以不善因業受為果心俱業受決定名憂憂非異熟如前已辨有情心狂何識因處頌曰心狂唯意識由業異熟生及怖害違憂除北洲在欲論曰有情心狂唯在意識若在五識必無心狂以五識身無分別故由五因故有情心狂一由有情業異熟起謂由彼用藥物呪術令他心狂或復令他飲非所欲若毒若酒或現威嚴怖禽獸等或放猛火焚燒山澤或作坑穽陷墜衆生或餘事業令他失念由此業因於當來世感別異熟能令心狂二由驚怖謂非人等現可怖形來相逼迫有情見已遂致心狂三由傷害謂因事業惱非人等由彼瞋故傷其肢節遂致心狂四由乖違謂由身內風熱痰界互相違反大種乖適故致心狂五由愁憂謂因喪失親愛等事愁毒纏懷心遂發狂如婆私等若在意識方有心狂復許心狂業異熟起如何心受非異熟耶不説心狂是業異熟但言是業異熟所生謂惡業因感不平等異熟大種依此大種心便失念故説為狂如是心狂對於心亂應作四句謂有心狂而非心亂乃至廣説狂非亂者謂諸狂者不染汙心亂非狂者謂不狂者諸染汙心狂亦亂者謂諸狂者諸染汙心非狂亂者謂不狂者不染汙心除北俱盧所餘欲界諸有情類容有心狂謂欲天心尚有狂者况人惡趣得離心狂地獄恆狂多苦逼故謂諸地獄恆為種種異類苦具傷害末摩猛利難忍苦受所逼尚不自識况了是非故地獄中怨心傷歎猖狂馳呌世傳有文欲界聖中唯除諸佛大種乖適容有心狂無異熟生若有定業必應先受後方得聖若非定業由得聖故能令無果亦無驚怖超五畏故亦無傷害以諸聖者無非人等憎嫌事故亦無愁憂證法性故又經中説業有三種謂曲穢濁其相云何頌曰説曲穢濁業依諂瞋貪生論曰身語意三各有三種謂曲穢濁如其次第應知依諂瞋貪所生謂依諂生身語意業名為曲業諂曲類故若依瞋生身語意業名為穢業瞋穢類故若依貪生身語意業名為濁業貪濁類故音釋罝弶罝子邪切𮊁也弶其向切施羂於道也凶勃凶許恭切暴也勃蒲昧切逆也莠興久切似禾之草也簸揚簸布火切揚餘亮切粳秕粳苦郎切秕補弭切涸下各切竭也鹵郎古切地不生物曰鹵鍵渠建切坑穽坑口莖切塹也穽才性切陷穽也
