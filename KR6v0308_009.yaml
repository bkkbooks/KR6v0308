body:
  text: 尊者世親造唐三藏法師玄奘奉詔譯扶桑雒陽比丘旭雅編輯分別世品第三之二當往何趣所起中有形狀如何頌曰此一業引故如當本有形本有謂死前居生剎那後論曰若業能引當所往趣彼業即招能往中有故此中有若往彼趣即如所趣當本有形若爾於一狗等腹中容有五趣中有頓起既有地獄中有現前如何不能焚燒母腹彼居本有亦不恆燒如暫遊園况在中有設許能燒如不可見亦不可觸以中有身極微細故所難非理諸趣中有雖居一腹非互觸燒業所遮故欲中有量雖如小兒年五六歲而根明利菩薩中有如盛年時形量周圓具諸相好故住中有將入胎時照百俱胝四大洲等若爾何故菩薩母夢中見白象子來入己右脅此吉瑞相非關中有菩薩久捨傍生趣故如訖栗枳王夢所見十事謂大象井𣒰檀妙園林小象二獼猴廣堅衣鬬諍如是所夢但表當來餘事先兆非如所見又諸中有從生門入非破母腹而得入胎故雙生者前小後大法善現説復云何通白象相端嚴具六牙四足正知入母腹寢如仙隱林不必須通非三藏故諸諷頌言或過實故若必須通如菩薩母所見夢相造頌無失色界中有量圓滿如本有與衣俱生慙愧增故菩薩中有亦與衣俱鮮白苾芻尼由本願力故彼於世世有自然衣恆不離身隨時改變乃至最後般涅槃時即以此衣纏尸焚葬所餘欲界中有無衣由皆增長無慙愧故所以本有其體是何謂死有前生有後蘊總説有體是五取蘊於中位別分析為四一者中有義如前説二者生有謂於諸趣結生剎那三者本有除生剎那死前餘位四者死有謂最後念次中有前有色有情具足四有若在無色中闕具三已説形量餘義當辨頌曰同淨天眼見業通疾具根無對不可轉食香非久住倒心趣欲境濕化染香處天首上三橫地獄頭歸下論曰此中有身同類相見若有修得極淨天眼亦能得見諸生得眼皆不能觀以極細故有餘師説天中有眼具足能見五趣中有人鬼傍生地獄中有見四三二一謂自下除上一切通中業通最疾凌虛自在是謂通義通由業得名為業通此通勢用速故名疾中有具得最疾業通上至世尊無能遮抑以業勢力最強盛故一切中有皆具五根對謂對礙此金剛等所不能遮故名無對曾聞析破炎赤鐵圍見於其中有蟲生故應往彼趣中有已生一切種力皆不能轉謂不可令人中有沒餘中有趣餘類亦然為往彼趣中有已起但應往彼定不往餘欲界中有身資段食不雖資段食然細非粗其細者何謂唯香氣由斯故得健達縛名諸字界中義非一故而音短者如設建途及羯建途略故無過諸少福者唯食惡香其多福者好香為食如是中有為住幾時大德説言此無定限生緣未合中有恆存由彼命根非別業引與所趣人等衆同分一故若異此者中有命根最後滅時應立死有設有肉聚等妙高山至夏雨時變成蟲聚應言諸中有漸待此時為説從何方頓來至此雖無經論誠文判釋然依正理應作是言有雜類生數無邊際貪著香味壽量短促彼諸有情因此氣貪香味故俱時命終由愛覺先感蟲身業同時於此受細蟲身或多有情應俱生此多緣未合住中有中今遇多緣方頓生此應俱生者定不異時如有能招轉輪王業要至人壽八萬歲時或過此時方頓與果非於餘位此亦應然故世尊言諸有情類業果差別不可思議尊者世友言此極多七日若生緣未合便數死數生有餘師言極七七日毗婆沙説此住少時以中有中樂求生有故非久住速往結生其有生緣未即和合若定此處此類應生業力即令此緣和合若非定託此和合緣便即寄生餘處餘類有説轉受相似類生且如家牛及狗熊馬欲增次屬夏秋冬春野牛野干羆驢無定前四中有若不遇時如次轉生後四同類豈不中有必無與生衆同分別一業引故如何可言轉受相似如是中有為至所生先起倒心馳趣欲境彼由業力所起眼根雖住遠方能見生處父母交會而起倒心若男緣母起於男欲若女緣父起於女欲翻此緣二俱起瞋心故施設論有如是説時健達縛於二心中隨一現行謂愛或恚彼由起此二種倒心便謂己身與所愛合所憎不淨泄至胎時謂是己有便生喜慰從茲蘊厚中有便沒生有起已名已結生若男處胎依母右脅向背蹲坐若女處胎依母左脅向腹而住若非男女住母胎時隨所起貪如應而住必無中有非女非男以中有身必具根故由處中有或女或男故入母胎隨應而住後胎增長或作不男於此義中復應思擇為由業力精血大種即成根依為業別生根依大種依精血住有言精血即成根依謂前無根中有俱滅後有根者無間續生如種與芽滅生道理由斯初位名羯邏藍亦妙順成此經文句父母不淨生羯邏藍又告比丘汝等長夜執受血滴增羯吒私有餘師説別生大種如依葉糞引有蟲生依不淨聚中生羯邏藍故説父母不淨生羯邏藍故與彼經無相違失如是且説胎卵二生餘隨所應今次當説若濕生者染香故生謂遠知生處香氣便生愛染往彼受生隨業所應香有淨穢若化生者染處故生謂遠觀知當所生處便生愛染往彼受生隨業所應處有淨穢豈於地獄亦生愛染由心倒故起染無失謂彼中有或見自身冷雨寒風之所逼切見熱地獄火焰熾然情欣暖觸投身於彼或見自身熱風盛火之所逼害見寒地獄心欲清涼投身於彼先舊諸師作如是説由見先造感彼業時己身伴類馳往赴彼又天中有首正上升如從坐起人鬼傍生中有行相還如人等地獄中有頭下足上顛墜其中故伽他説顛墜於地獄足上頭歸下由毀謗諸仙樂寂修苦行前説倒心入母胎藏一切中有皆定爾耶不爾經言入胎有四其四者何頌曰一於入正知二三兼住出四於一切位及卵恆無知前三種入胎謂輪王二佛業智俱勝故如次四餘生論曰有諸有情多集福業勤修念慧故死生時念力所持正知無亂於中或有正知入胎或有正知住胎兼入或正知出兼知入住兼言為顯後必帶前有諸有情福智俱少入住出位皆不正知入不正知住出亦爾順結頌法故逆説四諸卵生者入胎等位皆恆無知如何卵生從卵而出言入胎藏以卵生者先必入胎或據當來名卵生者如契經説造作有為世間亦言煮飯磨故説卵生入胎無失云何三位正不正知且諸有情若福微薄入母胎位起倒想解見大風雨毒熱嚴寒或大軍衆聲威亂逼遂見己入密草稠林葉窟茅廬投樹牆下住時見己住在此中出位見身從此處出若福增多入母胎位起倒想解自見己身入妙園林升華臺殿居勝牀等住出如前是謂三時不正知者若於三位皆能正知於入等時無倒想解謂入胎位知自入胎住出胎時自知住出又別顯示四入胎者且前三種謂轉輪王獨覺大覺如其次第初入胎者謂轉輪王入位正知非住非出二入胎者謂獨勝覺入住正知非於出位三入胎者謂無上覺入住出位皆能正知此初三人以當名顯何緣如是三品不同由業智俱如次勝故第一業勝謂轉輪王宿世曾修廣大福故第二智勝謂獨勝覺久習多聞勝思擇故第三俱勝謂無上覺曠劫修行勝福智故除前三種餘胎卵生福智俱劣合成第四此中外道執我者言若許有情轉趣餘世即我所執有我義成今為遮彼頌曰無我唯諸蘊煩惱業所為由中有相續入胎如燈焰如引次第增相續由惑業更趣於餘世故有輪無初論曰汝等所執我為何相能捨此蘊能續餘蘊內用士夫此定非有如色眼等不可得故世尊亦言有業有異熟作者不可得謂能捨此蘊及能續餘蘊唯除法假法假謂何依此有彼有此生故彼生廣説緣起若爾何等我非所遮唯有諸蘊謂唯於蘊假立我名非所遮遣若爾應許諸蘊即能從此世間轉至餘世蘊剎那滅於轉無能數習煩惱業所為故令中有蘊相續入胎譬如燈焰雖剎那滅而能相續轉至餘方諸蘊亦然名轉無失故雖無我而由惑業諸蘊相續入胎義成如業所引次第轉增諸蘊相續復由煩惱業力所為轉趣餘世謂非一切所引諸蘊增長相續修促量齊引壽業因有差別故隨能引業勢力增微齊爾所時次第增長云何次第如聖説言最初羯邏藍次生頞部曇從此生閉尸閉尸生鍵南次鉢羅奢佉後髮毛爪等及色根形相漸次而轉增謂母胎中分位有五一羯邏藍位二頞部曇位三閉尸位四鍵南位五鉢羅奢佉位此胎中箭漸次轉增乃至色根形相滿位由業所起異熟風力轉胎中箭令趣産門如強糞團過量祕澀從此轉隨劇苦難任其母或時威儀飲食執作過分或由其子宿罪業力死于胎內時有女人或諸醫者妙通産法善養嬰兒溫以酥油睒末梨汁用塗其手執小利刀內如糞坑最極臭惡雜穢充塞黑暗所居無量千蟲之所依止常流穢汁恆須對治精血垢膩潰爛臭滑不淨流溢鄙惡叵觀穿漏薄皮以覆其上宿業所引身瘡孔中分解肢節牽出於外然此胎子乘宿所為順後受業所趣難了或復無難安隱得生體如新瘡細軟難觸或母愛子或餘女人以如刀灰粗澀兩手執取洗拭而安處之次含清酥飲以母乳漸令習受細粗飲食次第轉增至根熟位復起煩惱積集諸業由此身壞復有如前中有相續更趣餘世如是惑業為因故生生復為因起於惑業從此惑業更復有生故知有輪旋環無始若執有始始應無因始既無因餘應自起現見芽等因種等生由處及時俱決定故又由火等熟變等生由此定無無因起法説常因論如前已遣是故生死決定無初然有後邊由因盡故生依因故因滅壞時生果必亡理定應爾如種滅壞芽必不生如是蘊相續説三生為位頌曰如是諸緣起十二支三際前後際各二中八據圓滿論曰十二支者一無明二行三識四名色五六處六觸七受八愛九取十有十一生十二老死言三際者一前際二後際三中際即是過未及現三生云何十二支於三際建立謂前後際各立二支中際八支故成十二無明行在前際生老死在後際所餘八在中際此中際八一切有情此一生中皆具有不非皆具有若爾何故説有八支據圓滿者此中意説補特伽羅歷一切位名圓滿者非諸中夭及色無色但據欲界補特伽羅大緣起經説具有故彼説佛告阿難陀言識若不入胎得增廣大不不也世尊乃至廣説有時但説二分緣起一前際攝二後際攝前七支前際攝謂無明乃至受後五支後際攝謂從愛至老死前後因果二分攝故無明等支何法為體頌曰宿惑位無明宿諸業名行識正結生蘊六處前名色從生眼等根三和前六處於三受因異未了知名觸在淫愛前受貪資具淫愛為得諸資具遍馳求名取有謂正能造牽當有果業結當有名生至當受老死論曰於宿生中諸煩惱位至今果熟總謂無明彼與無明俱時行故由無明力彼現行故如説王行非無導從王俱勝故總謂王行於宿生中福等業位至今果熟總得行名初句位言流至老死於母胎等正結生時一剎那位五蘊名識結生識後六處生前中間諸位總稱名色此中應説四處生前而言六者據滿立故眼等已生至根境識未和合位得六處名已至三和未了三受因差別位總名為觸已了三受因差別相未起淫貪此位名受貪妙資具淫愛現行未廣追求此位名愛為得種種上妙資具周遍馳求此位名取因馳求故積集能牽當有果業此位名有由是業力從此捨命正結當有此位名生當有生支即如今識生剎那後漸增乃至當來受位總名老死如是老死即如今世名色六處觸受四支辨十二支體別如是又諸緣起差別説四一者剎那二者連縛三者分位四者遠續云何剎那謂剎那頃由貪行殺具十二支癡謂無明思即是行於諸境事了別名識識俱三蘊總稱名色住名色根説為六處六處對餘和合有觸領觸名受貪即是愛與此相應諸纏名取所起身語二業名有如是諸法起即名生熟變名老滅壞名死復有説者剎那連縛如品類足俱遍有為十二支位所有五蘊皆分位攝即此懸遠相續無始説名遠續世尊於此意説者何頌曰傳許約位説從勝立支名論曰傳許世尊唯約分位説諸緣起有十二支若支支中皆具五蘊何緣但立無明等名以諸位中無明等勝故就勝立無明等名謂若位中無明最勝此位五蘊總名無明乃至位中老死最勝此位五蘊總名老死故體雖總名別無失何緣經説此十二支與品類足所説有異如彼論説云何為緣起謂一切有為乃至廣説素怛纜言因別意趣阿毗達磨依法相説如是宣説分位剎那遠續連縛唯有情數情非情等是謂差別契經何故唯説有情頌曰於前後中際為遣他愚惑論曰為三際中遣他愚惑三際差別唯在有情如何有情前際愚惑謂於前際生如是疑我於過去世為曾有非有何等我曾有云何我曾有如何有情後際愚惑謂於後際生如是疑我於未來世為當有非有何等我當有云何我當有如何有情中際愚惑謂於中際生如是疑何等是我此我云何我誰所有我當有誰為除如是三際愚惑故經唯説有情緣起如其次第説無明行及生老死并識至有所以者何以契經説比丘諦聽若有比丘於諸緣起及緣生法能以如實正慧觀見彼必不於三際愚惑謂我於過去世為曾有非有等有餘師説愛取有三亦為除他後際愚惑此三皆是後際因故又應知此説緣起門雖有十二支而三二為性三謂惑業事二謂果與因其義云何頌曰三煩惱二業七事亦名果略果及略因由中可比二論曰無明愛取煩惱為性行及有支以業為性餘識等七以事為性是煩惱業所依事故如是七事即亦名果義準餘五即亦名因以煩惱業為自性故何緣中際廣説果因開事為五或為二故後際略果事唯二故前際略因或唯一故由中際廣可以比度前後二際廣義已成故不別説説便無用若緣起支唯十二者不説老死果生死應有終不説無明因生死應有始或應更立餘緣起支餘復有餘成無窮失不應更立然無前過此中世尊由義已顯云何已顯頌曰從惑生惑業從業生於事從事事惑生有支理唯此論曰從惑生惑謂愛生取從惑生業謂取生有無明生行從業生事謂行生識及有生生從事生事謂從識支生於名色乃至從觸生於受支及從生支生於老死從事生惑謂受生愛由立有支其理唯此已顯老死為事惑因及顯無明為事惑果無明老死事惑性故豈假更立餘緣起支故經言如是純大苦蘊集若不爾者此言何用有餘釋言餘契經説非理作意為無明因無明復生非理作意非理作意亦取支攝故亦説在此契經中此非理作意如何取支攝若言由此與彼相應則愛無明亦應彼攝設許彼攝云何能證非理作意為無明因若但彼攝即證因果愛與無明亦彼攝故應不別立為緣起支餘復釋言餘契經説非理作意為無明因無明復生非理作意非理作意説在觸時故餘經説眼色為緣生癡所生染濁作意此於受位必引無明故餘經言由無明觸所生諸受為緣生愛是故觸時非理作意與受俱轉無明為緣由此無明無無因過亦不須立餘緣起支又緣起支無無窮失非理作意從癡生故如契經説眼色為緣生癡所生染濁作意餘經雖有如是誠言然此經中應更須説不須更説如何證知由理證知何等為理非離無明受能為愛緣以阿羅漢受不生愛故又非無倒觸能為染受緣亦非離無明觸可成顛倒阿羅漢觸非顛倒故由如是理為證故知若爾便應有大過失諸由正理可得證知一切皆應不須更説故彼所説不成釋難然上所言經不別説老死有果無明有因生死便成有終始者此難非理經意別故亦非所説理不圓滿所以者何此經但欲除所化者三際愚故由所化者唯生是疑云何有情三世連續謂從前世今世得生今世復能生於後世如來但為除彼疑情説十二支如前已辨謂前後中際為遣他愚惑如世尊告諸比丘言吾當為汝説緣起法緣已生法此二何異且本論文此二無別以俱言攝一切法故如何未來未已起法可同過現説緣已生云何未來未已作法得同過現説名有為由能作思力已造故若爾無漏如何有為彼亦善思力已造故若爾就得涅槃應然理實應言依種類説如未變壞亦得色名由種類同所説無失然今正釋契經意者頌曰此中意正説因起果已生論曰諸支因分説名緣起由此為緣能起果故諸支果分説緣已生由此皆從緣所生故如是一切二義俱成諸支皆有因果性故若爾安立應不俱成不爾所觀有差別故謂若觀此名緣已生非即觀斯復名緣起猶如因果父子等名尊者望滿意謂諸法有是緣起非緣已生應作四句第一句者謂未來法第二句者謂阿羅漢最後心位過現諸法第三句者餘過現法第四句者諸無為法經部諸師作如是白此中所説為述己情為是經義若是經義經義不然所以者何且前所説分位緣起十二五蘊為十二支違背契經經異説故如契經説云何為無明謂前際無智乃至廣説此了義説不可抑令成不了義故前所説分位緣起經義相違非一切經皆了義説亦有隨勝説如象迹喻經云何內地界謂髮毛爪等雖彼非無餘色等法而就勝説此亦應爾所引非證非彼經中欲以地界辨髮毛等成非具説然彼經中以髮毛等分別地界非有地界越髮毛等故彼契經是具足説此經所説無明等支亦應如彼成具足説除所説外無復有餘豈不地界越髮毛等涕淚等中其體亦有涕等皆亦説在彼經如説復有身中餘物設復同彼有餘無明今應顯示若引異類置無明中此有何益雖於諸位皆有五蘊然隨此有無彼定有無者可立此法為彼法支或有五蘊而無有行隨福非福不動行識乃至愛等是故經義即如所説所説四句理亦不然若未來諸法非緣已生者便違契經經説云何緣已生法謂無明行至生老死或應不許二在未來是則壞前所立三際有説緣起是無為法以契經言如來出世若不出世如是緣起法性常住由如是意理則可然若由別意理則不然云何如是意云何為別意而説可然及不可然謂若意説如來出世若不出世行等常緣無明等起非緣餘法或復無緣故言常住如是意説理則可然若謂意説有別法體名為緣起湛然常住此別意説理則不然所以者何生起俱是有為相故非別常法為無常相可應正理又起必應依起者立此常住法彼無明等何相關預而説此法依彼而立為彼緣起又名緣起而謂相常如是句義無相應理此中緣起是何句義鉢剌底是至義醫底界是行義由先助力界義轉變故行由至轉變成緣叁是和合義嗢是上升義鉢地界是有義有藉合升轉變成起由此有法至於緣已和合升起是緣起義如是句義理不應然所以者何依一作者有二作用於前作用應有已言如有一人浴已方食無少行法有在起前先至於緣後時方起非無作者可有作用故説頌曰至緣若起先非有不應理若俱便壞已彼應先説故無如是過且應反詰聲論諸師法何時起為在現在為在未來設爾何失起若現在起非已生如何成現現是已生復如何起已生復起便致無窮起若未來爾時未有何成作者作者既無何有作用故於起位即亦至緣起位者何謂未來世諸行正起即於此位亦説至緣又聲論師妄所安立作者作用理實不成有是作者起是作用非於此中見有作者異起作用真實可得故此義言於俗無謬此緣起義即是所説依此有故彼有此生故彼生故應引彼釋緣起義故説頌曰如非有而起至緣應亦然生已起無窮或先有非有俱亦有言已暗至燈已滅及開口已眠若後眠應閉有執更以餘義釋難鉢剌底是種種義醫底界是不住義不住由種種助故變成緣叁是聚集義嗢是上升義鉢地界是行義由嗢為先行變成起此説種種緣和合已令諸行法聚集升起是緣起義如是所釋於此可然眼色各為緣起於眼識等此中種種聚集豈成何故世尊説前二句謂依此有彼有及此生故彼生為於緣起知決定故如餘處説依無明有諸行得有非離無明可有諸行又為顯示諸支傳生謂依此支有彼支得有由彼支生故餘支得生又為顯示三際傳生謂依前際有中際得有由中際生故後際得生又為顯示親傳二緣謂有無明無間生行或展轉力諸行方生有餘師釋如是二句為破無因常因二論謂非無因諸行可有亦非由常自性我等無生因故諸行得生若爾便成前句無用但由後句此生故彼生能具破前無因常因故然或有執有我為依行等得有由無明等因分生故行等得生是故世尊為除彼執決判果有即由生因若此生故彼生即依此有彼有非謂果有別依餘因謂無明緣行乃至如是純大苦蘊集軌範諸師釋此二句為顯因果不斷及生謂依無明不斷諸行不斷即由無明生故諸行得生如是展轉皆應廣説有釋為顯因果住生謂乃至因相續有果相續亦有及即由因分生故諸果分亦生此欲辨生何緣説住又佛何故破次第説先説住已而後説生復有釋言依此有彼有者依果有因有滅此生故彼生者恐疑果無有因生是故復言由因生故果方得起非謂無因經義若然應作是説依此有彼成無又應先言因生故果生已後乃可説依果有因成無如是次第方名善説若異此者次辨緣起依何次第先説因滅故彼所釋非此經義復次云何無明緣行廣説乃至生緣老死我今略顯符順經義謂諸愚夫於緣生法不知唯行妄起我見及我慢執為自受樂非苦樂故造作身等各三種業謂為自身受當樂故造諸福業受當來樂非苦樂故造不動業受現樂故造非福業如是名為無明緣行由引業力識相續流如火焰行往彼彼趣憑附中有馳赴所生結生有身名行緣識若作此釋善順契經分別識支通於六識識為先故於此趣中有名色生具足五蘊展轉相續遍一期生於大因緣辨緣起等諸經皆有如是説故如是名色漸成熟時具眼等根説為六處次與境合便有識生三和故有順樂等觸依此便生樂等三受從此三受引生三愛謂由苦逼有於樂受發生愛欲或有於樂非苦樂受發生色愛或有唯於非苦樂受生無色愛從欣受愛起欲等取此中欲者謂五妙欲見謂六十二見如梵網經廣説戒謂遠離惡戒禁謂狗牛等禁如諸離繫及婆羅門播輸鉢多般利伐羅多迦等異類外道受持種種露形拔髮杖烏鹿皮持髻塗灰執三杖剪鬚髮等無義苦行我語謂內身依之説我故有餘師説我見我慢名為我語云何此二獨名我語由此二種説有我故我非有故説名我語如契經説比丘當知愚昧無聞諸異生類隨假言説起於我執於中實無我及我所於前四種取謂欲貪故薄伽梵諸經中釋云何為取所謂欲貪由取為緣積集種種招後有業説名為有如世尊告阿難陀言招後有業説名為有有為緣故識相續流趣未來生如前道理具足五蘊説名為生以生為緣便有老死其相差別廣説如經如是純言顯唯有行無我我所大苦蘊言顯苦積集無初無後集言為顯諸苦蘊生毗婆沙宗如前已説音釋俱胝梵語也此云百億胝張尼切羆班糜切獸名羯邏藍梵語也此云凝滑邏魯可切鍵南梵語也此云凝厚鍵巨展切睒失再切潰爛潰胡對切壞也爛郎旰切腐也
